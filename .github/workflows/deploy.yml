name: Build App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"
          cache: "npm" # Automatically caches dependencies for faster subsequent runs

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Show files
        run: ls -la
